name: ast_base_unbalanced
task: train
model:
  type: ast
  pretrained_model_name_or_path: /opt/gen-content/margasanov/hf_models/ast-finetuned-audioset-10-10-0.4593
  freeze_backbone: false
data:
  index_csv: data/processed/index.csv
  sample_rate: 16000
  duration: 8.0
features:
  mel_bins: 128
  window_ms: 25
  hop_ms: 10
  ast_max_length: 1024
training:
  seed: 42
  batch_size: 8
  epochs: 50
  lr: 0.00005
  weight_decay: 0.0001
  weighted_loss: false
  weighted_sampler: false
  optimizer: adamw
  device: cuda
output_dir: reports/runs
